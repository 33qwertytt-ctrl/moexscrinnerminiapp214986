# Nginx reverse proxy для BondScreener MOEX
# Скопировать в sites-available и включить сайт:
#   sudo cp scripts/deploy/nginx-bondscreener.conf /etc/nginx/sites-available/bondscreener
#   sudo ln -sf /etc/nginx/sites-available/bondscreener /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# После проверки по HTTP включите HTTPS:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d __DOMAIN__

upstream bondscreener_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    client_max_body_size 32m;

    location / {
        proxy_pass http://bondscreener_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
